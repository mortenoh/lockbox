site_name: Lockbox
site_description: Offline-first PWA with client-side encryption at rest - a learning project
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy

nav:
  - Home: index.md
  - Guide:
      - Web Crypto API: guide/web-crypto.md
      - WebAuthn and Passkeys: guide/webauthn.md
  - Design:
      - Architecture: design/architecture.md
      - Encryption: design/encryption.md
      - Offline Sync: design/offline-sync.md
      - Service Worker: design/service-worker.md
      - Threat Model: design/threat-model.md
  - Context:
      - Trade-offs and Alternatives: context/trade-offs.md
      - DHIS2 Context: context/dhis2.md
      - Roadmap: context/roadmap.md
  - Reference:
      - API Reference: reference/api.md
      - Development: reference/development.md
      - Remote Access: reference/remote-access.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  # Several architecture/sequence diagrams are wide enough to need panning on a
  # laptop screen; this makes them drag- and scroll-zoomable in place.
  - panzoom:
      mermaid: true
      full_screen: true
